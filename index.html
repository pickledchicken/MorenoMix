<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MorenoMix Concrete Solutions</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <img src="images/MorenoMix-logo+color+lato.png" alt="MorenoMix Logo" class="logo">
  <nav>
    <a href="#services">Services</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="overlay">
    <h1>Concrete Solutions That Last</h1>
    <p>Serving Eastern North Carolina</p>
    <a href="#contact" class="btn">Free Estimate</a>
  </div>
</section>

<section id="services" class="services">
  <h2>Our Services</h2>
  <div class="cards">
    <div class="card"><h3>Driveways</h3></div>
    <div class="card"><h3>Foundations</h3></div>
    <div class="card"><h3>Patios</h3></div>
  </div>
</section>

<section id="gallery" class="gallery">
  <h2>Recent Projects</h2>
  <div class="grid">
    <div class="photo"></div>
    <div class="photo"></div>
    <div class="photo"></div>
  </div>
</section>

<section id="contact" class="contact">
  <h2>Call or Text Us</h2>
  <p>(252) 499-2279</p>
</section>

</body>
</html>
